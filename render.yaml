services:
  - type: web
    name: ubid-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SYNC_DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: REDIS_URL
        value: ""
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: AUTO_LINK_THRESHOLD
        value: "0.85"
      - key: REVIEW_THRESHOLD
        value: "0.50"
